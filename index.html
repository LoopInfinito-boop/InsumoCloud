<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Insumos Cloud</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0f172a">

  <style>
    * {margin:0;padding:0;box-sizing:border-box;}

    /* 🔥 TEMA CLARO (PADRÃO) */
    :root {
      --bg: linear-gradient(135deg, #0ea5e9, #14e460);
      --menu-bg: rgba(255,255,255,0.9);
      --menu-btn: #e2e8f0;
      --text: #0f172a;
      --card: #ffffff;
    }

    /* 🌙 TEMA ESCURO */
    .dark {
      --bg: linear-gradient(135deg, #0f172a, #020617);
      --menu-bg: rgba(15,23,42,0.9);
      --menu-btn: #1e293b;
      --text: #e2e8f0;
      --card: #020617;
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      min-height:100vh;
      display:flex;
      flex-direction:column;
      color: var(--text);
      transition: 0.3s;
    }

    /* MENU */
    .menu {
      display:flex;
      gap:10px;
      padding:12px;
      background: var(--menu-bg);
      backdrop-filter: blur(10px);
      box-shadow:0 8px 25px rgba(0,0,0,0.2);
    }

    .menu button {
      flex:1;
      padding:12px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-weight:600;
      background: var(--menu-btn);
      color: var(--text);
      transition: all 0.25s ease;
    }

    .menu button:hover {
      background:#22c55e;
      color:white;
      transform: translateY(-2px);
    }

    .menu button.ativo {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color:white;
    }

    .menu .toggle {
      flex:0;
      width:50px;
      font-size:18px;
    }

    .area {
      flex:1;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:10px;
    }

    /* CONTEÚDO MÍNIMO VISÍVEL PARA PWA */
    .welcome {
      background: var(--card);
      padding:20px;
      border-radius:12px;
      text-align:center;
      font-weight:600;
      font-size:1.2rem;
      box-shadow:0 5px 15px rgba(0,0,0,0.15);
    }

    iframe {
      width:100%;
      height:400px;
      border:none;
      background: var(--card);
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <div class="menu">
    <button onclick="abrir('dashboard.html', this)">Dashboard</button>
    <button onclick="abrir('entrada.html', this)">Entrada</button>
    <button onclick="abrir('estoque.html', this)">Estoque</button>
    <button onclick="abrir('saida.html', this)">Saída</button>
    <button class="toggle" onclick="toggleTema()">🌙</button>
  </div>

  <div class="area">
    <!-- 🌟 CONTEÚDO MÍNIMO VISÍVEL PARA PWA -->
    <div class="welcome">Bem-vindo ao Insumos Cloud! Selecione uma opção no menu.</div>
    
    <!-- IFRAME COM PÁGINAS INTERNAS -->
    <iframe id="frame" src="entrada.html"></iframe>
  </div>

  <script>
    const frame = document.getElementById("frame");

    function enviarTema(){
      const tema = document.body.classList.contains("dark") ? "dark" : "light";
      frame.contentWindow.postMessage({ tema }, "*");
    }

    function abrir(pagina, botao){
      frame.src = pagina;
      document.querySelectorAll(".menu button").forEach(btn => btn.classList.remove("ativo"));
      botao.classList.add("ativo");
      frame.onload = () => enviarTema();
    }

    function toggleTema(){
      document.body.classList.toggle("dark");
      const temaAtual = document.body.classList.contains("dark") ? "dark" : "light";
      localStorage.setItem("tema", temaAtual);
      enviarTema();
    }

    window.onload = () => {
      const temaSalvo = localStorage.getItem("tema");
      if(temaSalvo === "dark") document.body.classList.add("dark");
      document.querySelector(".menu button").classList.add("ativo");
      frame.onload = () => enviarTema();
    };
  </script>

  <script>
    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("./sw.js")
        .then(()=>console.log("SW registrado"))
        .catch(err=>console.log("Erro SW:", err));
    }
  </script>

</body>
</html>
